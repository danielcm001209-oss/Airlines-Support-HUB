<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Airlines Support HUB</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Barlow:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<style>
:root{
  --bg:#07090f;--s1:#0d1117;--s2:#131a24;--s3:#1a2332;
  --border:#1e2d42;--border2:#263547;
  --text:#cdd6e8;--text2:#7a90ab;--text3:#3d5470;
  --accent:#2d7aee;--cyan:#0eb8c9;--green:#17c97a;
  --amber:#f0a500;--red:#e84545;--purple:#8b5cf6;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Barlow',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
header{background:var(--s1);border-bottom:1px solid var(--border);padding:0 14px;height:52px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;gap:6px;overflow-x:auto;}
.logo{font-size:15px;font-weight:900;white-space:nowrap;flex-shrink:0;}.logo span{color:var(--cyan);}
.header-mid{display:flex;align-items:center;gap:6px;flex:1;justify-content:center;}
.date-pill{font-family:'IBM Plex Mono',monospace;font-size:11px;color:var(--text2);background:var(--s2);border:1px solid var(--border);padding:4px 10px;border-radius:20px;white-space:nowrap;}
.hactions{display:flex;gap:5px;flex-shrink:0;}
.tabs{background:var(--s1);border-bottom:1px solid var(--border);display:flex;padding:0 14px;overflow-x:auto;}
.tab{padding:10px 12px;font-size:11px;font-weight:700;letter-spacing:.5px;color:var(--text3);cursor:pointer;border-bottom:2px solid transparent;transition:all .15s;text-transform:uppercase;white-space:nowrap;}
.tab:hover{color:var(--text2);}.tab.active{color:var(--accent);border-bottom-color:var(--accent);}
.app{display:flex;height:calc(100vh - 94px);overflow:hidden;}
.page{display:none;flex:1;overflow:hidden;}.page.active{display:flex;}
.full-page{flex:1;overflow-y:auto;padding:16px;}
.board-wrap{flex:1;overflow-y:auto;padding:14px;}
.out-panel{width:300px;min-width:260px;border-left:1px solid var(--border);display:flex;flex-direction:column;}
.out-head{padding:10px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.out-title{font-size:11px;font-weight:800;letter-spacing:1px;color:var(--text3);text-transform:uppercase;}
.out-body{flex:1;overflow-y:auto;padding:12px;font-family:'IBM Plex Mono',monospace;font-size:11px;line-height:1.8;color:var(--text2);white-space:pre-wrap;}
.btn{border:1px solid var(--border2);background:var(--s2);color:var(--text);padding:6px 12px;border-radius:7px;cursor:pointer;font-size:12px;font-weight:700;font-family:'Barlow',sans-serif;transition:all .15s;white-space:nowrap;}
.btn:hover{border-color:var(--accent);color:var(--accent);}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}.btn-primary:hover{opacity:.85;color:#fff;}
.btn-green{background:var(--green);border-color:var(--green);color:#000;}.btn-green:hover{opacity:.85;}
.btn-danger{background:rgba(232,69,69,.15);border-color:rgba(232,69,69,.4);color:var(--red);}.btn-danger:hover{background:var(--red);color:#fff;}
.btn-outline{background:transparent;}
.shift-block{background:var(--s1);border:1px solid var(--border);border-radius:10px;margin-bottom:10px;overflow:hidden;}
.shift-head{padding:10px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);}
.shift-tag{font-size:11px;font-weight:800;padding:3px 9px;border-radius:5px;letter-spacing:.5px;}
.shift-time{font-size:11px;font-family:'IBM Plex Mono',monospace;color:var(--text3);flex:1;}
.shift-count{font-size:11px;color:var(--text3);}
.shift-add{width:26px;height:26px;border-radius:6px;background:var(--s2);border:1px solid var(--border2);color:var(--text3);cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all .15s;flex-shrink:0;}
.shift-add:hover{border-color:var(--accent);color:var(--accent);}
.shift-body{padding:10px;}
.shift-empty{color:var(--text3);font-size:12px;padding:6px 2px;}
.agents-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;}
.agent-card{background:var(--s2);border:1px solid var(--border2);border-radius:8px;padding:10px;cursor:pointer;transition:border-color .15s;}
.agent-card:hover{border-color:var(--accent);}
.atop{display:flex;align-items:center;gap:8px;margin-bottom:6px;}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.aname{font-size:12px;font-weight:700;line-height:1.2;}
.aterm{font-size:10px;color:var(--text3);}
.drows{display:flex;flex-direction:column;gap:2px;}
.drow{display:flex;align-items:baseline;gap:5px;font-size:11px;}
.dlabel{color:var(--text3);font-size:10px;min-width:62px;flex-shrink:0;}
.bp{color:var(--accent);font-family:'IBM Plex Mono',monospace;font-weight:700;font-size:11px;}
.bm{color:var(--amber);font-size:11px;}
.bt{color:var(--green);font-size:11px;}
.bc{color:var(--purple);font-size:11px;}
.stats-bar{display:flex;gap:10px;margin-bottom:12px;flex-wrap:wrap;}
.stat{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:8px 14px;font-size:11px;}
.stat-n{font-size:20px;font-weight:900;line-height:1;}
.stat-l{color:var(--text3);font-size:10px;margin-top:2px;}
.sup-bar{background:rgba(232,69,69,.07);border:1px solid rgba(232,69,69,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;display:flex;align-items:center;flex-wrap:wrap;gap:6px;}
.sup-lbl{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--red);text-transform:uppercase;margin-right:4px;}
.sup-chip{font-size:12px;font-weight:700;color:var(--red);}
.unassigned-bar{background:rgba(240,165,0,.06);border:1px solid rgba(240,165,0,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px;}
.unassigned-label{font-size:10px;font-weight:800;letter-spacing:1px;color:var(--amber);text-transform:uppercase;margin-bottom:5px;}
.unassigned-chips{display:flex;flex-wrap:wrap;gap:5px;}
.uchip{font-size:11px;font-weight:700;padding:2px 8px;border-radius:12px;border:1px solid var(--border2);color:var(--text2);cursor:pointer;transition:all .15s;}
.uchip:hover{border-color:var(--accent);color:var(--accent);}
.obs-sec{background:var(--s1);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-top:10px;}
.obs-item{
